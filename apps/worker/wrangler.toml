name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "82966b9062049168a976bca7595a5a41"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "fdeaaa90-e690-4f49-96b3-c009ff8588fc"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]
